name: kodu-package-release

on:
  push:
    branches:
      - dev
    paths:
      - "packages/opencode/**"
      - ".github/workflows/kodu-package-release.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    if: github.repository == 'Zoharvan12/kodu'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git identity
        run: |
          git config --global user.email "kodu@sst.dev"
          git config --global user.name "kodu"

      - name: Install dependencies
        run: |
          bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build CLI
        run: |
          bun run --cwd packages/opencode script/build.ts --skip-embed-web-ui --single
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: |
          cd packages/opencode/dist/@kodu/cli-linux-x64
          bun pm pack
          npm publish *.tgz --access public --tag dev
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
