name: kodu-package-release

on:
  push:
    branches:
      - dev
    paths:
      - "packages/**"
      - "script/**"
      - ".github/workflows/kodu-package-release.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-npm:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'Zoharvan12/kodu'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git identity
        run: |
          git config --global user.email "kodu@sst.dev"
          git config --global user.name "kodu"

      - name: Build packages
        run: |
          bun turbo build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: |
          ./script/publish.ts
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'Zoharvan12/kodu'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images
        run: |
          docker build -t ghcr.io/Zoharvan12/kodu:latest -t ghcr.io/Zoharvan12/kodu:${{ github.sha }} .
          docker push ghcr.io/Zoharvan12/kodu --all-tags
