name: kodu-release

on:
  push:
    branches:
      - ci
      - dev
      - beta
      - snapshot-*
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump major, minor, or patch"
        required: false
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Override version (optional)"
        required: false
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.version || inputs.bump }}

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  version:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'anomalyco/kodu'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-bun

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          kodu-app-id: ${{ vars.KODU_APP_ID }}
          kodu-app-secret: ${{ secrets.KODU_APP_SECRET }}

      - name: Install Kodu
        if: inputs.bump || inputs.version
        run: bun i -g @kodu/cli

      - id: version
        run: |
          ./script/version.ts
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
          KODU_BUMP: ${{ inputs.bump }}
          KODU_VERSION: ${{ inputs.version }}
          KODU_API_KEY: ${{ secrets.KODU_API_KEY }}
          GH_REPO: ${{ (github.ref_name == 'beta' && 'anomalyco/kodu-beta') || github.repository }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      release: ${{ steps.version.outputs.release }}
      tag: ${{ steps.version.outputs.tag }}
      repo: ${{ steps.version.outputs.repo }}

  build-cli:
    needs: version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'anomalyco/kodu'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-tags: true

      - uses: ./.github/actions/setup-bun

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          kodu-app-id: ${{ vars.KODU_APP_ID }}
          kodu-app-secret: ${{ secrets.KODU_APP_SECRET }}

      - name: Build
        id: build
        run: |
          ./packages/kodu/script/build.ts
        env:
          KODU_VERSION: ${{ needs.version.outputs.version }}
          KODU_RELEASE: ${{ needs.version.outputs.release }}
          GH_REPO: ${{ needs.version.outputs.repo }}
          GH_TOKEN: ${{ steps.committer.outputs.token }}

      - uses: actions/upload-artifact@v4
        with:
          name: kodu-cli
          path: |
            packages/kodu/dist/kodu-darwin*
            packages/kodu/dist/kodu-linux*

      - uses: actions/upload-artifact@v4
        with:
          name: kodu-cli-windows
          path: packages/kodu/dist/kodu-windows*
    outputs:
      version: ${{ needs.version.outputs.version }}

  sign-cli-windows:
    needs:
      - build-cli
      - version
    runs-on: blacksmith-4vcpu-windows-2025
    if: github.repository == 'anomalyco/kodu'
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
      AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
      AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
    steps:
      - uses: actions/checkout@v3

      - uses: actions/download-artifact@v4
        with:
          name: kodu-cli-windows
          path: packages/kodu/dist

      - name: Setup git committer
        id: committer
        uses: ./.github/actions/setup-git-committer
        with:
          kodu-app-id: ${{ vars.KODU_APP_ID }}
          kodu-app-secret: ${{ secrets.KODU_APP_SECRET }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
          files: |
            ${{ github.workspace }}\packages\kodu\dist\kodu-windows-arm64\bin\kodu.exe
            ${{ github.workspace }}\packages\kodu\dist\kodu-windows-x64\bin\kodu.exe
            ${{ github.workspace }}\packages\kodu\dist\kodu-windows-x64-baseline\bin\kodu.exe
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Verify Windows CLI signatures
        shell: pwsh
        run: |
          $files = @(
            "${{ github.workspace }}\packages\kodu\dist\kodu-windows-arm64\bin\kodu.exe",
            "${{ github.workspace }}\packages\kodu\dist\kodu-windows-x64\bin\kodu.exe",
            "${{ github.workspace }}\packages\kodu\dist\kodu-windows-x64-baseline\bin\kodu.exe"
          )

          foreach ($file in $files) {
            $sig = Get-AuthenticodeSignature $file
            if ($sig.Status -ne "Valid") {
              throw "Invalid signature for ${file}: $($sig.Status)"
            }
          }

      - name: Repack Windows CLI archives
        working-directory: packages/kodu/dist
        shell: pwsh
        run: |
          Compress-Archive -Path "kodu-windows-arm64\bin\*" -DestinationPath "kodu-windows-arm64.zip" -Force
          Compress-Archive -Path "kodu-windows-x64\bin\*" -DestinationPath "kodu-windows-x64.zip" -Force
          Compress-Archive -Path "kodu-windows-x64-baseline\bin\*" -DestinationPath "kodu-windows-x64-baseline.zip" -Force

      - name: Upload signed Windows CLI release assets
        if: needs.version.outputs.release != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.committer.outputs.token }}
        run: |
          gh release upload "v${{ needs.version.outputs.version }}" `
            "${{ github.workspace }}\packages\kodu\dist\kodu-windows-arm64.zip" `
            "${{ github.workspace }}\packages\kodu\dist\kodu-windows-x64.zip" `
            "${{ github.workspace }}\packages\kodu\dist\kodu-windows-x64-baseline.zip" `
            --clobber `
            --repo "${{ needs.version.outputs.repo }}"

      - uses: actions/upload-artifact@v4
        with:
          name: kodu-cli-signed-windows
          path: |
            packages/kodu/dist/kodu-windows-arm64
            packages/kodu/dist/kodu-windows-x64
            packages/kodu/dist/kodu-windows-x64-baseline
