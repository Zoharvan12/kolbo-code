name: kodu-update-snapshots

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-snapshots:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.repository == 'anomalyco/kodu'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-bun

      - name: Configure git identity
        run: |
          git config --global user.email "bot@kodu.ai"
          git config --global user.name "kodu"

      - name: Update snapshots
        run: |
          bun turbo test --update
        env:
          KODU_EXPERIMENTAL_DISABLE_FILEWATCHER: "true"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update test snapshots"
          title: "chore: update test snapshots"
          body: |
            This PR updates test snapshots.
            
            Generated by [kodu-update-snapshots workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/kodu-update-snapshots.yml).
          branch: snapshot-update
          delete-branch: true
