name: kodu

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  kodu:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /kodu') ||
      startsWith(github.event.comment.body, '/kodu')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run kodu
        uses: anomalyco/kodu/github@latest
        env:
          KODU_API_KEY: ${{ secrets.KODU_API_KEY }}
          KODU_PERMISSION: '{"bash": "deny"}'
        with:
          model: kodu/claude-opus-4-5
