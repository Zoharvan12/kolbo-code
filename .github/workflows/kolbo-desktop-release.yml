name: kolbo-desktop-release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      draft:
        required: false
        type: string
        default: "false"
      sign:
        required: false
        type: string
        default: "true"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      draft:
        description: "Create as draft release"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      sign:
        description: "Sign Windows binaries (uses signing credits)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  KOLBO_VERSION: ${{ inputs.version || github.event.inputs.version }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundle: nsis
            artifact-suffix: windows-x64
          - platform: macos-14
            rust-target: universal-apple-darwin
            bundle: dmg
            artifact-suffix: darwin-universal
          # - platform: ubuntu-22.04
          #   rust-target: x86_64-unknown-linux-gnu
          #   bundle: deb
          #   artifact-suffix: linux-x64

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 300
    if: endsWith(github.repository, '/kolbo-code')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # universal-apple-darwin isn't a real rustup target — install both arch slices
          # so Tauri can lipo them into a universal binary.
          targets: ${{ matrix.rust-target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.rust-target }}

      - name: Rust cache restore
        id: rust-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target/aarch64-apple-darwin/release/deps
            packages/desktop/src-tauri/target/aarch64-apple-darwin/release/.fingerprint
            packages/desktop/src-tauri/target/aarch64-apple-darwin/release/build
            packages/desktop/src-tauri/target/x86_64-apple-darwin/release/deps
            packages/desktop/src-tauri/target/x86_64-apple-darwin/release/.fingerprint
            packages/desktop/src-tauri/target/x86_64-apple-darwin/release/build
            packages/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/deps
            packages/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/.fingerprint
            packages/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/build
          key: rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: bun install

      - name: Set version
        working-directory: packages/desktop
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ env.KOLBO_VERSION }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Version set to ${{ env.KOLBO_VERSION }}"

      - name: Fix symlinks (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cp packages/ui/src/custom-elements.d.ts packages/app/src/custom-elements.d.ts

      - name: Apply Kolbo branding
        working-directory: packages/desktop
        run: node scripts/apply-branding.cjs

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-14'
        env:
          APPLE_CERT_DATA: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT }}
          APPLE_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          echo "$APPLE_CERT_DATA" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Download CLI sidecar
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          mkdir -p packages/desktop/src-tauri/sidecars
          # Install outside the monorepo workspace to avoid ENOWORKSPACES errors
          mkdir -p /tmp/kolbo-cli-install
          cd /tmp/kolbo-cli-install
          npm install @kolbo/kolbo-code@latest 2>&1 || true
          # On macOS we lipo arm64 + x64 into a universal sidecar — but
          # `npm install` only resolves the OPTIONAL dependency that matches
          # the host CPU, leaving the other one missing. Force-install both
          # platform binaries explicitly so the universal build can run.
          if [ "${{ matrix.platform }}" == "macos-14" ]; then
            npm install @kolbo/kolbo-code-darwin-arm64@latest @kolbo/kolbo-code-darwin-x64@latest --force --no-save 2>&1 || true
          fi
          cd "$GITHUB_WORKSPACE"
          BASE="/tmp/kolbo-cli-install/node_modules"
          PLATFORM="${{ matrix.platform }}"
          RUST_TARGET="${{ matrix.rust-target }}"
          if [ "$PLATFORM" == "windows-latest" ]; then
            KOLBO_BIN="$BASE/@kolbo/kolbo-code/node_modules/@kolbo/kolbo-code-windows-x64/bin/kolbo.exe"
            [ -f "$KOLBO_BIN" ] || KOLBO_BIN="$BASE/@kolbo/kolbo-code-windows-x64/bin/kolbo.exe"
            DEST="packages/desktop/src-tauri/sidecars/opencode-cli-${RUST_TARGET}.exe"
            if [ -f "$KOLBO_BIN" ]; then
              cp "$KOLBO_BIN" "$DEST"
              echo "✓ CLI sidecar copied from $KOLBO_BIN"
              SKILLS_SRC="$(dirname "$(dirname "$KOLBO_BIN")")/skills"
            fi
          elif [ "$PLATFORM" == "macos-14" ]; then
            # Universal sidecar: lipo arm64 + x64 kolbo binaries together so the
            # universal .app can spawn the CLI on both Apple Silicon and Intel Macs.
            ARM_BIN="$BASE/@kolbo/kolbo-code/node_modules/@kolbo/kolbo-code-darwin-arm64/bin/kolbo"
            [ -f "$ARM_BIN" ] || ARM_BIN="$BASE/@kolbo/kolbo-code-darwin-arm64/bin/kolbo"
            X64_BIN="$BASE/@kolbo/kolbo-code/node_modules/@kolbo/kolbo-code-darwin-x64/bin/kolbo"
            [ -f "$X64_BIN" ] || X64_BIN="$BASE/@kolbo/kolbo-code-darwin-x64/bin/kolbo"
            DEST="packages/desktop/src-tauri/sidecars/opencode-cli-${RUST_TARGET}"
            if [ -f "$ARM_BIN" ] && [ -f "$X64_BIN" ]; then
              lipo -create "$ARM_BIN" "$X64_BIN" -output "$DEST"
              chmod +x "$DEST"
              echo "✓ Universal CLI sidecar created via lipo:"
              lipo -info "$DEST"
              SKILLS_SRC="$(dirname "$(dirname "$ARM_BIN")")/skills"
              KOLBO_BIN="$DEST"
            else
              echo "⚠ Need both arm64 + x64 kolbo CLI binaries to build universal sidecar"
              echo "  arm64: $([ -f "$ARM_BIN" ] && echo found || echo MISSING)"
              echo "  x64:   $([ -f "$X64_BIN" ] && echo found || echo MISSING)"
              ls "$BASE/@kolbo/" 2>/dev/null || true
              KOLBO_BIN=""
            fi
          else
            KOLBO_BIN="$BASE/@kolbo/kolbo-code/node_modules/@kolbo/kolbo-code-darwin-x64/bin/kolbo"
            [ -f "$KOLBO_BIN" ] || KOLBO_BIN="$BASE/@kolbo/kolbo-code-darwin-x64/bin/kolbo"
            DEST="packages/desktop/src-tauri/sidecars/opencode-cli-${RUST_TARGET}"
            if [ -f "$KOLBO_BIN" ]; then
              cp "$KOLBO_BIN" "$DEST"
              echo "✓ CLI sidecar copied from $KOLBO_BIN"
              SKILLS_SRC="$(dirname "$(dirname "$KOLBO_BIN")")/skills"
            fi
          fi
          if [ -n "$KOLBO_BIN" ] && [ -f "$DEST" ]; then
            SKILLS_DEST="packages/desktop/src-tauri/skills"
            if [ -d "$SKILLS_SRC" ]; then
              cp -r "$SKILLS_SRC" "$SKILLS_DEST"
              echo "✓ Skills copied ($(ls "$SKILLS_DEST" | wc -l) skills)"
            else
              cp -r packages/opencode/skills "$SKILLS_DEST"
              echo "✓ Skills copied from monorepo fallback"
            fi
          else
            echo "⚠ Sidecar not in place — build will likely fail"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
        with:
          projectPath: packages/desktop
          tauriScript: bunx tauri
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundle }}
          tagName: desktop-v${{ env.KOLBO_VERSION }}
          releaseName: "Kolbo Code v${{ env.KOLBO_VERSION }}"
          releaseBody: |
            ## Kolbo Code v${{ env.KOLBO_VERSION }}

            AI coding agent desktop app by [Kolbo.AI](https://kolbo.ai)

            ### Download
            - **Windows**: `Kolbo Code_${{ env.KOLBO_VERSION }}_x64-setup.exe`

            ### What's included
            - Full native GUI with sessions, MCP, tool calls, file attachments
            - RTL support (Arabic, Hebrew)
            - 17 languages
            - Light/dark mode
            - Auto-updater

            ### Install CLI separately
            ```bash
            npm i -g @kolbo/kolbo-code
            ```
          releaseDraft: ${{ github.event.inputs.draft }}
          prerelease: false

      - name: Save Rust cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/desktop/src-tauri/target/aarch64-apple-darwin/release/deps
            packages/desktop/src-tauri/target/aarch64-apple-darwin/release/.fingerprint
            packages/desktop/src-tauri/target/aarch64-apple-darwin/release/build
            packages/desktop/src-tauri/target/x86_64-apple-darwin/release/deps
            packages/desktop/src-tauri/target/x86_64-apple-darwin/release/.fingerprint
            packages/desktop/src-tauri/target/x86_64-apple-darwin/release/build
            packages/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/deps
            packages/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/.fingerprint
            packages/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/build
          key: rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('packages/desktop/src-tauri/Cargo.lock') }}

      - name: Resolve Windows installer path
        if: matrix.platform == 'windows-latest'
        id: win-exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem "packages\desktop\src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis" -Filter "*.exe" | Select-Object -First 1
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $($exe.FullName)"

      - name: Sign Windows installer (SSL.com eSigner)
        if: matrix.platform == 'windows-latest' && (inputs.sign == 'true' || github.event.inputs.sign == 'true')
        uses: SSLcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.SSLCOM_USERNAME }}
          password: ${{ secrets.SSLCOM_PASSWORD }}
          credential_id: ${{ secrets.SSLCOM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSLCOM_TOTP_SECRET }}
          file_path: ${{ steps.win-exe.outputs.path }}
          malware_block: "true"
          override: "true"

      - name: Notarize macOS DMG
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_DIR="packages/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          DMG=$(find "${DMG_DIR}" -maxdepth 1 -name "*.dmg" | head -1)
          if [ -z "${DMG}" ]; then echo "⚠ No DMG found to notarize"; exit 1; fi
          echo "Notarizing: $(basename ${DMG})"

          # macOS doesn't have GNU timeout — use gtimeout from coreutils
          brew install coreutils -q 2>/dev/null || true

          # Submit and wait — timeout after 15 min so we never hang indefinitely
          gtimeout 900 xcrun notarytool submit "${DMG}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait \
            --verbose || {
              echo "⚠ Notarization failed or timed out"
              exit 1
            }

          xcrun stapler staple "${DMG}"
          echo "✓ Notarization and stapling complete"

          # Re-upload the notarized DMG to overwrite the unnotarized one tauri-action uploaded
          TAG="desktop-v${{ env.KOLBO_VERSION }}"
          gh release upload "${TAG}" "${DMG}" --clobber -R ${{ github.repository }}
          echo "✓ Notarized DMG uploaded"

      - name: Upload update bundles to release (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          $tag = "desktop-v${{ env.KOLBO_VERSION }}"
          $nsisDir = Join-Path $env:GITHUB_WORKSPACE "packages\desktop\src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis"
          $exe = Get-ChildItem $nsisDir -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Host "⚠ No .exe found"; Get-ChildItem $nsisDir; exit 1 }

          # Re-create the updater zip from the installer (tauri-action deletes the original)
          $zipName = [System.IO.Path]::GetFileNameWithoutExtension($exe.FullName) + ".nsis.zip"
          $zipPath = Join-Path $nsisDir $zipName
          Compress-Archive -Path $exe.FullName -DestinationPath $zipPath -Force
          Write-Host "Created: $zipName ($([math]::Round((Get-Item $zipPath).Length/1MB,1)) MB)"

          # Sign with Tauri signer
          Set-Location (Join-Path $env:GITHUB_WORKSPACE "packages\desktop")
          bunx tauri signer sign $zipPath
          Set-Location $env:GITHUB_WORKSPACE

          # Upload zip + sig
          gh release upload $tag $zipPath "$zipPath.sig" --clobber -R ${{ github.repository }}
          Write-Host "✓ Uploaded update bundle"

      - name: Upload update bundles to release (macOS)
        if: matrix.platform == 'macos-14'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          TAG="desktop-v${{ env.KOLBO_VERSION }}"
          DMG_DIR="packages/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          DMG=$(find "${DMG_DIR}" -maxdepth 1 -name "*.dmg" | head -1)
          if [ -z "${DMG}" ]; then echo "⚠ No .dmg found"; ls "${DMG_DIR}"; exit 1; fi
          echo "Found DMG: $(basename ${DMG})"

          # Mount DMG, extract .app, create tar.gz for updater
          MOUNT_POINT="/tmp/kolbo-dmg-mount"
          mkdir -p "${MOUNT_POINT}"
          hdiutil attach -nobrowse -quiet "${DMG}" -mountpoint "${MOUNT_POINT}"
          APP=$(find "${MOUNT_POINT}" -maxdepth 1 -name "*.app" -type d | head -1)
          APP_NAME=$(basename "${APP}")
          TAR_PATH="/tmp/${APP_NAME}.tar.gz"
          tar -czf "${TAR_PATH}" -C "${MOUNT_POINT}" "${APP_NAME}"
          hdiutil detach "${MOUNT_POINT}" -quiet
          echo "Created: $(basename ${TAR_PATH})"

          # Sign with Tauri signer
          cd packages/desktop
          bunx tauri signer sign "${TAR_PATH}"
          cd -

          gh release upload "${TAG}" "${TAR_PATH}" "${TAR_PATH}.sig" --clobber -R ${{ github.repository }}
          echo "✓ Uploaded macOS update bundle"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kolbo-code-${{ matrix.artifact-suffix }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            packages/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            packages/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.deb
            packages/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage
          retention-days: 30

  publish-updater:
    needs: build
    runs-on: ubuntu-latest
    if: endsWith(github.repository, '/kolbo-code')
    steps:
      - name: Build and publish update manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES_REPO_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          KOLBO_VERSION: ${{ github.event.inputs.version }}
        run: |
          TAG="desktop-v${KOLBO_VERSION}"
          SRC_REPO="${{ github.repository }}"
          RELEASES_REPO="Zoharvan12/kolbo-releases"

          # Download all assets from the versioned release (source repo)
          mkdir -p /tmp/assets
          gh release download "${TAG}" -R "${SRC_REPO}" -D /tmp/assets/
          ls /tmp/assets/

          # Re-upload versioned installer assets to kolbo-releases
          WIN_EXE=$(find /tmp/assets -name "*.exe" ! -name "*.zip" | head -1)
          MAC_DMG=$(find /tmp/assets -name "*.dmg" | head -1)
          WIN_ZIP_FILE=$(find /tmp/assets -name "*.nsis.zip" | head -1)
          MAC_TAR_FILE=$(find /tmp/assets -name "*.app.tar.gz" | head -1)
          WIN_SIG_FILE=$(find /tmp/assets -name "*.nsis.zip.sig" | head -1)
          MAC_SIG_FILE=$(find /tmp/assets -name "*.app.tar.gz.sig" | head -1)

          if [ -z "${WIN_SIG_FILE}" ] || [ -z "${MAC_SIG_FILE}" ]; then
            echo "⚠ Missing signature files — Windows: '${WIN_SIG_FILE}' Mac: '${MAC_SIG_FILE}'"
            exit 1
          fi

          # Ensure versioned release exists on kolbo-releases
          GH_TOKEN="${RELEASES_REPO_TOKEN}" gh release view "${TAG}" -R "${RELEASES_REPO}" 2>/dev/null || \
            GH_TOKEN="${RELEASES_REPO_TOKEN}" gh release create "${TAG}" -R "${RELEASES_REPO}" \
              --title "Kolbo Code v${KOLBO_VERSION}" \
              --notes "Kolbo Code v${KOLBO_VERSION}" \
              --latest 2>/dev/null || true

          # Upload installer + update bundles to kolbo-releases
          FILES=""
          [ -n "${WIN_EXE}" ] && FILES="${FILES} ${WIN_EXE}"
          [ -n "${MAC_DMG}" ] && FILES="${FILES} ${MAC_DMG}"
          [ -n "${WIN_ZIP_FILE}" ] && FILES="${FILES} ${WIN_ZIP_FILE}"
          [ -n "${MAC_TAR_FILE}" ] && FILES="${FILES} ${MAC_TAR_FILE}"
          [ -n "${WIN_SIG_FILE}" ] && FILES="${FILES} ${WIN_SIG_FILE}"
          [ -n "${MAC_SIG_FILE}" ] && FILES="${FILES} ${MAC_SIG_FILE}"
          GH_TOKEN="${RELEASES_REPO_TOKEN}" gh release upload "${TAG}" ${FILES} --clobber -R "${RELEASES_REPO}"
          echo "✓ Assets uploaded to kolbo-releases/${TAG}"

          WIN_SIG=$(cat "${WIN_SIG_FILE}")
          MAC_SIG=$(cat "${MAC_SIG_FILE}")
          WIN_ZIP=$(basename "${WIN_SIG_FILE}" .sig)
          MAC_TAR=$(basename "${MAC_SIG_FILE}" .sig)

          WIN_URL="https://github.com/${RELEASES_REPO}/releases/download/${TAG}/${WIN_ZIP}"
          MAC_URL="https://github.com/${RELEASES_REPO}/releases/download/${TAG}/${MAC_TAR}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << MANIFEST
          {
            "version": "${KOLBO_VERSION}",
            "notes": "",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${WIN_URL}"
              },
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${MAC_URL}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_SIG}",
                "url": "${MAC_URL}"
              }
            }
          }
          MANIFEST

          # Ensure updater release exists on kolbo-releases
          GH_TOKEN="${RELEASES_REPO_TOKEN}" gh release view updater -R "${RELEASES_REPO}" 2>/dev/null || \
            GH_TOKEN="${RELEASES_REPO_TOKEN}" gh release create updater -R "${RELEASES_REPO}" \
              --title "Auto-updater manifest" \
              --notes "Auto-updated by CI. Do not delete this release." \
              --prerelease

          GH_TOKEN="${RELEASES_REPO_TOKEN}" gh release upload updater latest.json --clobber -R "${RELEASES_REPO}"
          echo "✓ Update manifest published to kolbo-releases/updater"

          # Upload fixed-name installers for permanent "always latest" download links
          if [ -n "${WIN_EXE}" ]; then
            cp "${WIN_EXE}" /tmp/kolbo-code-setup.exe
            GH_TOKEN="${RELEASES_REPO_TOKEN}" gh release upload updater /tmp/kolbo-code-setup.exe --clobber -R "${RELEASES_REPO}"
            echo "✓ Uploaded kolbo-code-setup.exe (latest)"
          fi
          if [ -n "${MAC_DMG}" ]; then
            cp "${MAC_DMG}" /tmp/kolbo-code.dmg
            GH_TOKEN="${RELEASES_REPO_TOKEN}" gh release upload updater /tmp/kolbo-code.dmg --clobber -R "${RELEASES_REPO}"
            echo "✓ Uploaded kolbo-code.dmg (latest)"
          fi
