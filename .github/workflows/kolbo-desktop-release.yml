name: kolbo-desktop-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
      draft:
        description: "Create as draft release"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  KOLBO_VERSION: ${{ github.event.inputs.version }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            bundle: nsis
            artifact-suffix: windows-x64
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
            bundle: dmg
            artifact-suffix: darwin-aarch64
          # - platform: macos-13
          #   rust-target: x86_64-apple-darwin
          #   bundle: dmg
          #   artifact-suffix: darwin-x64
          # - platform: ubuntu-22.04
          #   rust-target: x86_64-unknown-linux-gnu
          #   bundle: deb
          #   artifact-suffix: linux-x64

    runs-on: ${{ matrix.platform }}
    if: endsWith(github.repository, '/kolbo-code')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install dependencies
        run: bun install

      - name: Set version
        working-directory: packages/desktop
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ env.KOLBO_VERSION }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Version set to ${{ env.KOLBO_VERSION }}"

      - name: Fix symlinks (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cp packages/ui/src/custom-elements.d.ts packages/app/src/custom-elements.d.ts

      - name: Apply Kolbo branding
        working-directory: packages/desktop
        run: node scripts/apply-branding.cjs

      - name: Import Apple signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERT_DATA: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT }}
          APPLE_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          echo "$APPLE_CERT_DATA" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Download CLI sidecar
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          mkdir -p packages/desktop/src-tauri/sidecars
          # Install outside the monorepo workspace to avoid ENOWORKSPACES errors
          mkdir -p /tmp/kolbo-cli-install
          cd /tmp/kolbo-cli-install
          npm install @kolbo/kolbo-code@latest 2>&1 || true
          cd "$GITHUB_WORKSPACE"
          BASE="/tmp/kolbo-cli-install/node_modules"
          PLATFORM="${{ matrix.platform }}"
          RUST_TARGET="${{ matrix.rust-target }}"
          if [ "$PLATFORM" == "windows-latest" ]; then
            KOLBO_BIN="$BASE/@kolbo/kolbo-code/node_modules/@kolbo/kolbo-code-windows-x64/bin/kolbo.exe"
            [ -f "$KOLBO_BIN" ] || KOLBO_BIN="$BASE/@kolbo/kolbo-code-windows-x64/bin/kolbo.exe"
            DEST="packages/desktop/src-tauri/sidecars/opencode-cli-${RUST_TARGET}.exe"
          elif [ "$PLATFORM" == "macos-latest" ]; then
            KOLBO_BIN="$BASE/@kolbo/kolbo-code/node_modules/@kolbo/kolbo-code-darwin-arm64/bin/kolbo"
            [ -f "$KOLBO_BIN" ] || KOLBO_BIN="$BASE/@kolbo/kolbo-code-darwin-arm64/bin/kolbo"
            DEST="packages/desktop/src-tauri/sidecars/opencode-cli-${RUST_TARGET}"
          else
            KOLBO_BIN="$BASE/@kolbo/kolbo-code/node_modules/@kolbo/kolbo-code-darwin-x64/bin/kolbo"
            [ -f "$KOLBO_BIN" ] || KOLBO_BIN="$BASE/@kolbo/kolbo-code-darwin-x64/bin/kolbo"
            DEST="packages/desktop/src-tauri/sidecars/opencode-cli-${RUST_TARGET}"
          fi
          if [ -f "$KOLBO_BIN" ]; then
            cp "$KOLBO_BIN" "$DEST"
            echo "✓ CLI sidecar copied from $KOLBO_BIN"

            # Copy bundled skills alongside the sidecar so the CLI can find them
            SKILLS_SRC="$(dirname "$(dirname "$KOLBO_BIN")")/skills"
            SKILLS_DEST="packages/desktop/src-tauri/skills"
            if [ -d "$SKILLS_SRC" ]; then
              cp -r "$SKILLS_SRC" "$SKILLS_DEST"
              echo "✓ Skills copied ($(ls "$SKILLS_DEST" | wc -l) skills)"
            else
              # Fallback: copy from monorepo
              cp -r packages/opencode/skills "$SKILLS_DEST"
              echo "✓ Skills copied from monorepo fallback"
            fi
          else
            echo "⚠ Binary not found, listing @kolbo packages:"
            ls "$BASE/@kolbo/" 2>/dev/null || echo "None found"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: packages/desktop
          tauriScript: bunx tauri
          args: --target ${{ matrix.rust-target }} --bundles ${{ matrix.bundle }}
          tagName: desktop-v${{ env.KOLBO_VERSION }}
          releaseName: "Kolbo Code v${{ env.KOLBO_VERSION }}"
          releaseBody: |
            ## Kolbo Code v${{ env.KOLBO_VERSION }}

            AI coding agent desktop app by [Kolbo.AI](https://kolbo.ai)

            ### Download
            - **Windows**: `Kolbo Code_${{ env.KOLBO_VERSION }}_x64-setup.exe`

            ### What's included
            - Full native GUI with sessions, MCP, tool calls, file attachments
            - RTL support (Arabic, Hebrew)
            - 17 languages
            - Light/dark mode
            - Auto-updater

            ### Install CLI separately
            ```bash
            npm i -g @kolbo/kolbo-code
            ```
          releaseDraft: ${{ github.event.inputs.draft }}
          prerelease: false

      - name: Upload update bundles to release (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          $tag = "desktop-v${{ env.KOLBO_VERSION }}"
          $nsisDir = Join-Path $env:GITHUB_WORKSPACE "packages\desktop\src-tauri\target\x86_64-pc-windows-msvc\release\bundle\nsis"
          $exe = Get-ChildItem $nsisDir -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Host "⚠ No .exe found"; Get-ChildItem $nsisDir; exit 1 }

          # Re-create the updater zip from the installer (tauri-action deletes the original)
          $zipName = [System.IO.Path]::GetFileNameWithoutExtension($exe.FullName) + ".nsis.zip"
          $zipPath = Join-Path $nsisDir $zipName
          Compress-Archive -Path $exe.FullName -DestinationPath $zipPath -Force
          Write-Host "Created: $zipName ($([math]::Round((Get-Item $zipPath).Length/1MB,1)) MB)"

          # Sign with Tauri signer
          Set-Location (Join-Path $env:GITHUB_WORKSPACE "packages\desktop")
          bunx tauri signer sign $zipPath
          Set-Location $env:GITHUB_WORKSPACE

          # Upload zip + sig
          gh release upload $tag $zipPath "$zipPath.sig" --clobber -R ${{ github.repository }}
          Write-Host "✓ Uploaded update bundle"

      - name: Upload update bundles to release (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          TAG="desktop-v${{ env.KOLBO_VERSION }}"
          DMG_DIR="packages/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          DMG=$(find "${DMG_DIR}" -maxdepth 1 -name "*.dmg" | head -1)
          if [ -z "${DMG}" ]; then echo "⚠ No .dmg found"; ls "${DMG_DIR}"; exit 1; fi
          echo "Found DMG: $(basename ${DMG})"

          # Mount DMG, extract .app, create tar.gz for updater
          MOUNT_POINT="/tmp/kolbo-dmg-mount"
          mkdir -p "${MOUNT_POINT}"
          hdiutil attach -nobrowse -quiet "${DMG}" -mountpoint "${MOUNT_POINT}"
          APP=$(find "${MOUNT_POINT}" -maxdepth 1 -name "*.app" -type d | head -1)
          APP_NAME=$(basename "${APP}")
          TAR_PATH="/tmp/${APP_NAME}.tar.gz"
          tar -czf "${TAR_PATH}" -C "${MOUNT_POINT}" "${APP_NAME}"
          hdiutil detach "${MOUNT_POINT}" -quiet
          echo "Created: $(basename ${TAR_PATH})"

          # Sign with Tauri signer
          cd packages/desktop
          bunx tauri signer sign "${TAR_PATH}"
          cd -

          gh release upload "${TAG}" "${TAR_PATH}" "${TAR_PATH}.sig" --clobber -R ${{ github.repository }}
          echo "✓ Uploaded macOS update bundle"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kolbo-code-${{ matrix.artifact-suffix }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.exe
            packages/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            packages/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.deb
            packages/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage
          retention-days: 30

  publish-updater:
    needs: build
    runs-on: ubuntu-latest
    if: endsWith(github.repository, '/kolbo-code')
    steps:
      - name: Build and publish update manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KOLBO_VERSION: ${{ github.event.inputs.version }}
        run: |
          TAG="desktop-v${KOLBO_VERSION}"
          REPO="${{ github.repository }}"

          # Download all assets from the versioned release
          mkdir -p /tmp/assets
          gh release download "${TAG}" -R "${REPO}" -D /tmp/assets/
          ls /tmp/assets/

          # Find signature files
          WIN_SIG_FILE=$(find /tmp/assets -name "*.nsis.zip.sig" | head -1)
          MAC_SIG_FILE=$(find /tmp/assets -name "*.app.tar.gz.sig" | head -1)

          if [ -z "${WIN_SIG_FILE}" ] || [ -z "${MAC_SIG_FILE}" ]; then
            echo "⚠ Missing signature files — Windows: '${WIN_SIG_FILE}' Mac: '${MAC_SIG_FILE}'"
            exit 1
          fi

          WIN_SIG=$(cat "${WIN_SIG_FILE}")
          MAC_SIG=$(cat "${MAC_SIG_FILE}")

          # Asset names (GitHub converts spaces→dots on upload)
          WIN_ZIP=$(basename "${WIN_SIG_FILE}" .sig)
          MAC_TAR=$(basename "${MAC_SIG_FILE}" .sig)

          WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/${WIN_ZIP}"
          MAC_URL="https://github.com/${REPO}/releases/download/${TAG}/${MAC_TAR}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << MANIFEST
          {
            "version": "${KOLBO_VERSION}",
            "notes": "",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${WIN_URL}"
              },
              "darwin-aarch64": {
                "signature": "${MAC_SIG}",
                "url": "${MAC_URL}"
              }
            }
          }
          MANIFEST

          # Ensure updater release exists
          gh release view updater -R "${REPO}" 2>/dev/null || \
            gh release create updater -R "${REPO}" \
              --title "Auto-updater manifest" \
              --notes "Auto-updated by CI. Do not delete this release." \
              --prerelease

          gh release upload updater latest.json --clobber -R "${REPO}"
          echo "✓ Update manifest published to updater release"

          # Upload fixed-name installers for permanent "always latest" download links
          WIN_EXE=$(find /tmp/assets -name "*.exe" ! -name "*.zip" | head -1)
          MAC_DMG=$(find /tmp/assets -name "*.dmg" | head -1)

          if [ -n "${WIN_EXE}" ]; then
            cp "${WIN_EXE}" /tmp/kolbo-code-setup.exe
            gh release upload updater /tmp/kolbo-code-setup.exe --clobber -R "${REPO}"
            echo "✓ Uploaded kolbo-code-setup.exe (latest)"
          fi
          if [ -n "${MAC_DMG}" ]; then
            cp "${MAC_DMG}" /tmp/kolbo-code.dmg
            gh release upload updater /tmp/kolbo-code.dmg --clobber -R "${REPO}"
            echo "✓ Uploaded kolbo-code.dmg (latest)"
          fi
