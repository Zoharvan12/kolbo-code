name: kolbo-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (latest | dev)"
        required: false
        default: "dev"
      version:
        description: "Explicit version to publish (e.g. 1.5.0) — required when tag=latest"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: endsWith(github.repository, '/kolbo-code')
    steps:
      # Pinned by commit SHA to defend against tag-move attacks
      # (Shai-Hulud class). Update via dependabot or by bumping the SHA
      # and the trailing comment in lock-step.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git identity
        run: |
          git config --global user.email "cli@kolbo.ai"
          git config --global user.name "kolbo-release-bot"

      - name: Install dependencies
        run: bun install

      - name: Audit dependencies
        # Non-blocking: surfaces high/critical advisories in the run log
        # without breaking a release if a transitive dep has an open advisory.
        # Review manually before tagging `latest`.
        run: bun audit || true

      - name: Run tests
        run: |
          cd packages/opencode
          bun test test/provider-sort.test.ts test/keybind.test.ts test/npm.test.ts --timeout 30000

      - name: Build all platform binaries
        env:
          KODU_CHANNEL: ${{ github.event.inputs.tag || 'dev' }}
          KODU_VERSION: ${{ github.event.inputs.version }}
        run: |
          cd packages/opencode
          # Build for every target in script/build.ts. Skipping the embedded
          # web UI keeps the binary lean and removes the need for packages/app
          # to build in CI.
          bun run script/build.ts --skip-embed-web-ui

      - name: Smoke test binary
        run: |
          BINARY=$(find packages/opencode/dist -name "kolbo" -not -name "*.js" | head -1)
          chmod +x "$BINARY"
          "$BINARY" --version

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          KODU_CHANNEL: ${{ github.event.inputs.tag || 'dev' }}
          KODU_VERSION: ${{ github.event.inputs.version }}
        run: |
          cd packages/opencode
          bun run script/publish.ts

      - name: Summary
        run: |
          echo "### Kolbo CLI published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "npm i -g @kolbo/kolbo-code@${{ github.event.inputs.tag || 'dev' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
