name: kolbo-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (latest | dev)"
        required: false
        default: "dev"
      version:
        description: "Explicit version to publish (e.g. 1.5.0) — required when tag=latest"
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: endsWith(github.repository, '/kolbo-cli')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git identity
        run: |
          git config --global user.email "cli@kolbo.ai"
          git config --global user.name "kolbo-release-bot"

      - name: Install dependencies
        run: bun install

      - name: Build all platform binaries
        env:
          KODU_CHANNEL: ${{ github.event.inputs.tag || 'dev' }}
          KODU_VERSION: ${{ github.event.inputs.version }}
        run: |
          cd packages/opencode
          # Build for every target in script/build.ts. Skipping the embedded
          # web UI keeps the binary lean and removes the need for packages/app
          # to build in CI.
          bun run script/build.ts --skip-embed-web-ui

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          KODU_CHANNEL: ${{ github.event.inputs.tag || 'dev' }}
          KODU_VERSION: ${{ github.event.inputs.version }}
        run: |
          cd packages/opencode
          bun run script/publish.ts

      - name: Summary
        run: |
          echo "### Kolbo CLI published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "npm i -g @kolbo-cli/kolbo@${{ github.event.inputs.tag || 'dev' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
