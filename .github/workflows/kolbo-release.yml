name: kolbo-release

on:
  push:
    branches:
      - dev
    paths:
      - "packages/opencode/**"
      - ".github/workflows/kolbo-release.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (default: dev)"
        required: false
        default: "dev"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'Zoharvan12/kolbo-cli'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git identity
        run: |
          git config --global user.email "cli@kolbo.ai"
          git config --global user.name "kolbo-release-bot"

      - name: Install dependencies
        run: bun install

      - name: Build all platform binaries
        env:
          KODU_CHANNEL: ${{ github.event.inputs.tag || 'dev' }}
        run: |
          cd packages/opencode
          # Build for every target in script/build.ts. Skipping the embedded
          # web UI keeps the binary lean and removes the need for packages/app
          # to build in CI.
          bun run script/build.ts --skip-embed-web-ui

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance disabled — repo is currently private and sigstore
          # provenance rejects non-public source repos. Flip the repo public
          # and re-add `--provenance` + NPM_CONFIG_PROVENANCE to enable.
          KODU_CHANNEL: ${{ github.event.inputs.tag || 'dev' }}
        run: |
          cd packages/opencode
          bun run script/publish.ts

      - name: Summary
        run: |
          echo "### Kolbo CLI published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "npm i -g @kolbo-cli/kolbo@${{ github.event.inputs.tag || 'dev' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
