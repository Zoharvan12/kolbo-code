name: Sync SKILL.md to kolbo-claude-plugin

# Mirrors the canonical Kolbo SKILL.md from this monorepo
# (packages/opencode/skills/kolbo/SKILL.md) into the dedicated
# Zoharvan12/kolbo-claude-plugin repo, with an auto-generated banner and
# a patch version bump on the plugin manifest.
#
# Why this exists: the plugin repo intentionally ships only ~6 files so
# antivirus tools (Bitdefender, Norton) have no monorepo of build configs
# and fonts to false-positive on. The skill source of truth stays here;
# the plugin's copy is a build artifact.
#
# Required secret: PLUGIN_REPO_TOKEN
#   A personal access token (classic, `repo` scope) with push access to
#   Zoharvan12/kolbo-claude-plugin. Create at:
#   https://github.com/settings/tokens
#   Add to this repo at:
#   Settings → Secrets and variables → Actions → New repository secret

on:
  push:
    branches: [master, main, dev]
    paths:
      - 'packages/opencode/skills/kolbo/SKILL.md'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'manual re-sync'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kolbo-code (source)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout kolbo-claude-plugin (destination)
        uses: actions/checkout@v4
        with:
          repository: Zoharvan12/kolbo-claude-plugin
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          path: plugin

      - name: Generate mirrored SKILL.md with auto-banner
        run: |
          set -euo pipefail
          SRC=source/packages/opencode/skills/kolbo/SKILL.md
          DST=plugin/skills/kolbo/SKILL.md
          SHA=$(cd source && git rev-parse --short HEAD)
          mkdir -p "$(dirname "$DST")"
          {
            echo "<!-- AUTO-GENERATED FROM kolbo-code@${SHA} — DO NOT EDIT THIS FILE DIRECTLY."
            echo "     Source of truth: github.com/Zoharvan12/kolbo-code"
            echo "     Path:            packages/opencode/skills/kolbo/SKILL.md"
            echo "     Synced by:       .github/workflows/sync-skill-to-plugin.yml in kolbo-code"
            echo "     To make changes: edit the source file in kolbo-code and push;"
            echo "                      this workflow will push an update commit + version bump here."
            echo "-->"
            echo ""
            cat "$SRC"
          } > "$DST"

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail
          cd plugin
          if git diff --quiet -- skills/kolbo/SKILL.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SKILL.md identical — nothing to push."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump plugin patch version
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd plugin
          MANIFEST=.claude-plugin/plugin.json
          OLD=$(jq -r .version "$MANIFEST")
          NEW=$(echo "$OLD" | awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}')
          tmp=$(mktemp)
          jq --arg v "$NEW" '.version = $v' "$MANIFEST" > "$tmp" && mv "$tmp" "$MANIFEST"
          echo "Bumped plugin version: $OLD → $NEW"

      - name: Commit & push to plugin repo
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd plugin
          SHA=$(cd ../source && git rev-parse --short HEAD)
          git config user.name  "kolbo-skill-sync[bot]"
          git config user.email "kolbo-skill-sync@users.noreply.github.com"
          git add skills/kolbo/SKILL.md .claude-plugin/plugin.json
          git commit -m "chore(skill): sync from kolbo-code@${SHA}"
          git push
