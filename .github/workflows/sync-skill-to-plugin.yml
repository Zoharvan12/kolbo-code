name: Sync SKILL.md to kolbo-claude-plugin

# Mirrors the canonical Kolbo SKILL.md from this monorepo
# (packages/opencode/skills/kolbo/SKILL.md) into the dedicated
# Zoharvan12/kolbo-claude-plugin repo, with an auto-generated banner and
# a patch version bump on the plugin manifest.
#
# Why this exists: the plugin repo intentionally ships only ~6 files so
# antivirus tools (Bitdefender, Norton) have no monorepo of build configs
# and fonts to false-positive on. The skill source of truth stays here;
# the plugin's copy is a build artifact.
#
# Required secret: PLUGIN_REPO_TOKEN
#   A personal access token (classic, `repo` scope) with push access to
#   Zoharvan12/kolbo-claude-plugin. Create at:
#   https://github.com/settings/tokens
#   Add to this repo at:
#   Settings → Secrets and variables → Actions → New repository secret

on:
  push:
    branches: [master, main, dev]
    paths:
      - 'packages/opencode/skills/kolbo/**'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'manual re-sync'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kolbo-code (source)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout kolbo-claude-plugin (destination)
        uses: actions/checkout@v4
        with:
          repository: Zoharvan12/kolbo-claude-plugin
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          path: plugin

      - name: Mirror skills/kolbo/ tree with auto-banner on SKILL.md
        run: |
          set -euo pipefail
          SRC_DIR=source/packages/opencode/skills/kolbo
          DST_DIR=plugin/skills/kolbo
          SHA=$(cd source && git rev-parse --short HEAD)

          # Wipe the destination tree so removed files in source disappear
          # in the plugin too. Re-create it from scratch.
          rm -rf "$DST_DIR"
          mkdir -p "$DST_DIR"

          # Copy the whole tree (SKILL.md + references/models/*.md + references/workflows/*.md)
          cp -R "$SRC_DIR"/. "$DST_DIR"/

          # Prepend the AUTO-GENERATED banner to SKILL.md only (reference files
          # don't need it — they're not the entry point and a banner on each
          # would be noise).
          SKILL=$DST_DIR/SKILL.md
          TMP=$(mktemp)
          {
            echo "<!-- AUTO-GENERATED FROM kolbo-code@${SHA} — DO NOT EDIT THIS FILE DIRECTLY."
            echo "     Source of truth: github.com/Zoharvan12/kolbo-code"
            echo "     Path:            packages/opencode/skills/kolbo/ (SKILL.md + references/**)"
            echo "     Synced by:       .github/workflows/sync-skill-to-plugin.yml in kolbo-code"
            echo "     To make changes: edit the source files in kolbo-code and push;"
            echo "                      this workflow mirrors the whole skills/kolbo/ tree here"
            echo "                      and bumps the plugin patch version."
            echo "-->"
            echo ""
            cat "$SKILL"
          } > "$TMP"
          mv "$TMP" "$SKILL"

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail
          cd plugin
          # Stage changes so git diff --cached sees additions, deletions, modifications
          # across the whole skill tree (not just SKILL.md).
          git add skills/kolbo/
          if git diff --cached --quiet -- skills/kolbo/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::skills/kolbo/ tree identical — nothing to push."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump plugin patch version + sync to skill VERSION + SKILL.md frontmatter
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd plugin
          MANIFEST=.claude-plugin/plugin.json
          OLD=$(jq -r .version "$MANIFEST")
          NEW=$(echo "$OLD" | awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}')

          # 1) Bump the plugin manifest (the existing behavior)
          tmp=$(mktemp)
          jq --arg v "$NEW" '.version = $v' "$MANIFEST" > "$tmp" && mv "$tmp" "$MANIFEST"
          echo "Bumped plugin manifest version: $OLD → $NEW"

          # 2) Sync the NEW version into the skill's VERSION file (single source of truth
          #    consumed by SKILL.md frontmatter, future Codex/Cursor manifests, and CI).
          VERSION_FILE=skills/kolbo/VERSION
          if [ -f "$VERSION_FILE" ]; then
            echo "$NEW" > "$VERSION_FILE"
            echo "Updated $VERSION_FILE to $NEW"
          fi

          # 3) Sync the same NEW version into the SKILL.md frontmatter `version:` field
          #    so the skill's self-reported version matches the plugin's published one.
          SKILL_FILE=skills/kolbo/SKILL.md
          if [ -f "$SKILL_FILE" ]; then
            # Replace the first `version:` line inside the opening frontmatter block only.
            python3 - "$SKILL_FILE" "$NEW" <<'PY'
import sys, re, pathlib
path = pathlib.Path(sys.argv[1])
new_v = sys.argv[2]
text = path.read_text()
# Match the opening frontmatter (between leading '---' and the next '---').
m = re.match(r"^(---\n)(.*?)(\n---\n)", text, re.DOTALL)
if not m:
    print(f"::warning::no frontmatter in {path}, skipping version sync")
    sys.exit(0)
fm = m.group(2)
new_fm, n = re.subn(r"(^|\n)version:\s*[^\n]+", lambda mm: f"{mm.group(1)}version: {new_v}", fm, count=1)
if n == 0:
    # No version field yet — inject right after the opening '---'.
    new_fm = f"version: {new_v}\n{fm}"
out = m.group(1) + new_fm + m.group(3) + text[m.end():]
path.write_text(out)
print(f"Synced SKILL.md frontmatter version to {new_v}")
PY
          fi

      - name: Commit & push to plugin repo
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd plugin
          SHA=$(cd ../source && git rev-parse --short HEAD)
          git config user.name  "kolbo-skill-sync[bot]"
          git config user.email "kolbo-skill-sync@users.noreply.github.com"
          # The skill tree (incl. updated VERSION + SKILL.md frontmatter) was modified
          # by the bump step above, so re-stage the whole tree along with the manifest.
          git add skills/kolbo/ .claude-plugin/plugin.json
          git commit -m "chore(skill): sync skills/kolbo/ tree from kolbo-code@${SHA}"
          git push
